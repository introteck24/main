<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h1>Job Application Form</h1>
    <fieldset>
        
        <legend>Personal Information</legend>
        <label for="name">Name </label><br><br>
        <input   type="text" id="name" placeholder="Enter your name"><br><br>
        <label for="fathern">Father's Name </label><br><br>
        <input type="text" id="fathern" placeholder="Enter your father's name"><br><br>
        <label for="emailadd">Email Address </label><br><br>
        <input  type="email" id="emailadd" placeholder="Enter your Email"><br><br>
        <label for="phone">Mobile Number</label><br><br>
        <input type="tel" id="number" placeholder="91+XXXXXXXXXX" maxlength="10" minlength="10">
        <label for="gender">Gender</label><br><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>

    </fieldset>
    <br><br>
    <fieldset>
        <legend>Educational Information</legend>

        <label for="acadmicqualification">Academic Qualification</label>
        <select id="acadmicqualification">
            
                <optgroup label="Bachelor's Degree">
                <option>Btech</option>
                <option>Bsc</option>
                <option>bcom</option>
                </optgroup>
                <optgroup label="Masters">
                    <option>Mtech</option>
                    <option>Msc</option>
                    <option>Mad</option>
                </optgroup>
            


        </select>
    </fieldset>

    
</body>
</html>
